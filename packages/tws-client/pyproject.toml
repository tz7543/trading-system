[project]
name = "tws-client"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "trading-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tws_client"]

[tool.uv.sources]
trading-core = { workspace = true }
