[project]
name = "execution"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "trading-core",
    "tws-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/execution"]

[tool.uv.sources]
trading-core = { workspace = true }
tws-client = { workspace = true }
